<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>위성 궤도 감속 및 재진입 시뮬레이터</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        /* 좌측 제어 패널 */
        #control-panel {
            width: 350px;
            background-color: #151a24;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            z-index: 10;
        }
        h2 {
            font-size: 1.3rem;
            color: #4ed9ff;
            border-bottom: 2px solid #223147;
            padding-bottom: 10px;
            margin-bottom: 5px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        label {
            font-size: 0.9rem;
            color: #a0aec0;
        }
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 8px;
            background: #1e2633;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .radio-label:hover {
            background: #29354a;
        }
        .radio-label input {
            accent-color: #4ed9ff;
        }
        .slider-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        input[type="range"] {
            width: 100%;
            accent-color: #4ed9ff;
            cursor: pointer;
        }
        .slider-val {
            align-self: flex-end;
            font-weight: bold;
            color: #4ed9ff;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        #btn-start {
            background-color: #00e676;
            color: #000;
        }
        #btn-start:hover {
            background-color: #33f091;
        }
        #btn-reset {
            background-color: #ff5252;
            color: #fff;
            display: none; /* 조건 충족 시 자바스크립트로 표시 */
        }
        #btn-reset:hover {
            background-color: #ff7373;
        }
        /* 우측 캔버스 영역 */
        #canvas-container {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a2333 0%, #080c14 100%);
        }
        canvas {
            background-color: transparent;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
        }
        /* 결과 메시지 오버레이 */
        #result-overlay {
            position: absolute;
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 5px;
            user-select: none;
            pointer-events: none;
            display: none;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .success { color: #00e676; }
        .fail { color: #ff5252; }
    </style>
</head>
<body>

    <div id="control-panel">
        <h2>위성 선택</h2>
        <div class="form-group">
            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="satellite" value="sputnik" checked>
                    Sputnik 1
                </label>
                <label class="radio-label">
                    <input type="radio" name="satellite" value="mir">
                    Mir 우주정거장
                </label>
                <label class="radio-label">
                    <input type="radio" name="satellite" value="iss">
                    ISS 국제우주정거장
                </label>
            </div>
        </div>

        <h2>역추진 감속량 설정</h2>
        <div class="form-group">
            <div class="slider-container">
                <input type="range" id="dv-slider" min="10" max="300" value="150">
                <span class="slider-val" id="dv-display">150 m/s</span>
            </div>
        </div>

        <button id="btn-start">시뮬레이션 시작</button>
        <button id="btn-reset">Reset</button>
    </div>

    <div id="canvas-container">
        <canvas id="simCanvas"></canvas>
        <div id="result-overlay"></div>
    </div>

    <script>
        // --- 물리 및 상값 설정 ---
        const MU = 3.986e14;         // 지구 중합 상수 (m^3/s^2)
        const RE = 6378000;          // 지구 반지름 (m)
        const H_ATM = 100000;        // 대기권 기준 고도 (100km = 100,000m)
        const R_ATM = RE + H_ATM;    // 지구 중심 기준 대기권 반지름
        const R_NEMO = 2688000;      // 포인트 니모 합격 반경 (m)

        // 위성 고유 제원 데이터
        const satData = {
            sputnik: { m0: 83.6, A: 0.26, Cd: 2.1, tau_life: 1, k_break: 5000, h0: 477000, color: '#e0e0e0' },
            mir: { m0: 130000, A: 350, Cd: 2.3, tau_life: 2, k_break: 150000, h0: 290000, color: '#ffb300' },
            iss: { m0: 450000, A: 2200, Cd: 2.6, tau_life: 3, k_break: 400000, h0: 320000, color: '#00b0ff' }
        };

        // --- 캔버스 설정 ---
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');

        function resizeCanvas() {
            const size = Math.min(container.clientWidth, container.clientHeight) - 40;
            canvas.width = size;
            canvas.height = size;
        }
        resizeCanvas();
        window.addEventListener('resize', () => { resizeCanvas(); drawScene(); });

        // --- 시각적 스케일 계산 (지구 반지름 R = 5 * 대기권 두께 h) ---
        // 화면 중앙을 (0,0)으로 잡았을 때의 시각적 픽셀 반지름 매핑
        // R_pixel = 5 * h_pixel 이므로, 대기권선 반지름은 6 * h_pixel이 됨.
        // 최대 위성 고도(Sputnik: 477km)까지 캔버스 안에 안전하게 들어오도록 스케일링 인자 계산
        let viewScale; 
        function updateVisualScale(satH0) {
            // 화면 중심에서 가장 먼 고도 = RE + satH0
            // 이 거리가 캔버스 하프 크기의 85% 안에 들어오도록 설정
            const maxPhysDist = RE + satH0;
            const maxPixelDist = canvas.width / 2 * 0.85;
            viewScale = maxPixelDist / maxPhysDist; 
        }

        // 각도 정의: 포인트 니모 중심은 지구 표면의 '가장 아래쪽(90도, 즉 Math.PI/2)'으로 고정합니다.
        // 이에 따라 낙하 시작 지점(대척점)은 '가장 위쪽(-90도, 즉 -Math.PI/2)'이 됩니다.
        const TARGET_ANGLE = Math.PI / 2; 
        const START_ANGLE = -Math.PI / 2;

        // --- 상태 변수 ---
        let currentSat = 'sputnik';
        let dv = 150;
        let isRunning = false;
        let isDeorbiting = false;
        let isAtmosphereEntered = false;
        let isFinished = false;

        let simTime = 0;          // 시뮬레이션 경과 시간 (초)
        let deorbitTime = 0;      // 역추진 이후 경과 시간 (초)
        let timeScale = 150;      // 물리 연산 가속 페이즈 인자 (초당 150초 흐름)

        // 위성의 실시간 물리 상태 (지구 중심 기준 극좌표계/직교좌표계 병행)
        let satR, satAngle, satV_r, satV_theta; 
        let satX, satY;
        let satVx, satVy;
        let entryGamma = 0;       // 대기권 진입각
        let finalArcLength = 0;   // 최종 파편 호 물리 길이

        // --- UI 연동 ---
        const dvSlider = document.getElementById('dv-slider');
        const dvDisplay = document.getElementById('dv-display');
        const btnStart = document.getElementById('btn-start');
        const btnReset = document.getElementById('btn-reset');
        const resultOverlay = document.getElementById('result-overlay');

        dvSlider.addEventListener('input', (e) => {
            dv = parseInt(e.target.value);
            dvDisplay.textContent = `${dv} m/s`;
        });

        document.querySelectorAll('input[name="satellite"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                currentSat = e.target.value;
                initSimulation();
            });
        });

        btnStart.addEventListener('click', () => {
            if (!isRunning && !isFinished) {
                isRunning = true;
                btnStart.disabled = true;
                disableInputs(true);
                animate();
            }
        });

        btnReset.addEventListener('click', () => {
            initSimulation();
        });

        function disableInputs(disable) {
            document.querySelectorAll('input[name="satellite"]').forEach(r => r.disabled = disable);
            dvSlider.disabled = disable;
        }

        // --- 초기화 함수 ---
        function initSimulation() {
            isRunning = false;
            isDeorbiting = false;
            isAtmosphereEntered = false;
            isFinished = false;
            simTime = 0;
            deorbitTime = 0;
            
            btnStart.disabled = false;
            btnStart.style.display = 'block';
            btnReset.style.display = 'none';
            disableInputs(false);
            resultOverlay.style.display = 'none';

            const p = satData[currentSat];
            updateVisualScale(p.h0);

            // 1단계: 원운동 초기 상태 설정
            satR = RE + p.h0;
            const v0 = Math.sqrt(MU / satR); // 원궤도 선속도

            // 수명(tau_life) 초 후에 정확히 START_ANGLE(-Math.PI/2)에 도달하도록 초기 스폰 각도 역산
            // dAngle = omega * dt = (v0 / satR) * tau_life
            const angularVelocity = v0 / satR;
            satAngle = START_ANGLE - (angularVelocity * p.tau_life);

            // 초기 속도 벡터 (원운동)
            satV_r = 0;
            satV_theta = v0;

            updateCartesian();
            drawScene();
        }

        function updateCartesian() {
            satX = satR * Math.cos(satAngle);
            satY = satR * Math.sin(satAngle);
        }

        // --- 물리 엔진 핵심 루프 (Runge-Kutta 4차 결합 수치해석) ---
        function physicsStep(dt) {
            const p = satData[currentSat];

            for (let step = 0; step < 10; step++) { // 정밀도를 위해 서브스텝 처리
                const subDt = dt / 10;

                // 1. 중력 가속도
                const g = MU / (satR * satR);
                let a_r = -g + (satV_theta * satV_theta) / satR;
                let a_theta = -(satV_r * satV_theta) / satR;

                // 2. 대기 항력 가속도 (대기권 진입 시 적용)
                if (satR <= R_ATM) {
                    isAtmosphereEntered = true;
                    const h = satR - RE;
                    // 대기 밀도 모델
                    const rho0 = 1.225;
                    const H_scale = 7500;
                    const rho = rho0 * Math.exp(-h / H_scale);

                    const v_mag = Math.sqrt(satV_r * satV_r + satV_theta * satV_theta);
                    const a_d = 0.5 * rho * v_mag * v_mag * (p.Cd * p.A) / p.m0;

                    // 항력은 속도 반대 방향으로 작용
                    if (v_mag > 0) {
                        a_r -= a_d * (satV_r / v_mag);
                        a_theta -= a_d * (satV_theta / v_mag);
                    }
                }

                // 위치 및 속도 업데이트 (오일러-크로머 기법)
                satV_r += a_r * subDt;
                satV_theta += a_theta * subDt;

                satR += satV_r * subDt;
                satAngle += (satV_theta / satR) * subDt;
            }

            updateCartesian();
        }

        // --- 화면 렌더링 함수 ---
        function drawScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const p = satData[currentSat];

            // 1. 대기권 영역 (동심원 비주얼 스케일 조정 적용)
            // 비주얼 스케일 요구사항: R_pixel = 5 * h_pixel
            // 따라서 실제 비율 대신 요구사항 비율대로 시각화 처리
            const h_pixel = (canvas.width / 2) * 0.15; 
            const r_earth_pixel = h_pixel * 5;
            const r_atm_pixel = r_earth_pixel + h_pixel;

            // 대기권 외부 광륜
            ctx.beginPath();
            ctx.arc(cx, cy, r_atm_pixel, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(78, 217, 255, 0.04)';
            ctx.fill();
            ctx.strokeStyle = 'rgba(78, 217, 255, 0.2)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // 2. 지구 본체
            ctx.beginPath();
            ctx.arc(cx, cy, r_earth_pixel, 0, Math.PI * 2);
            ctx.fillStyle = '#111827';
            ctx.fill();
            ctx.strokeStyle = '#223147';
            ctx.lineWidth = 3;
            ctx.stroke();

            // 3. 포인트 니모 영역 (지구 표면의 호)
            // 실제 반지름 대비 포인트 니모 반경의 비율 각도 계산: 기하학적 각도 = R_NEMO / RE
            const nemoHalfAngle = R_NEMO / RE; 
            ctx.beginPath();
            ctx.arc(cx, cy, r_earth_pixel, TARGET_ANGLE - nemoHalfAngle, TARGET_ANGLE + nemoHalfAngle);
            ctx.strokeStyle = '#00e676';
            ctx.lineWidth = 6;
            ctx.stroke();

            // 4. 위성 또는 파편 객체 그리기
            // 시각적 픽셀 위치 계산 (대기권 외부와 내부의 연동 변환)
            let satPixelR;
            if (satR >= R_ATM) {
                // 대기권 바깥: 대기권 경계선 기준으로 고도 비례 스케일링
                const physH = satR - R_ATM;
                satPixelR = r_atm_pixel + physH * viewScale * 0.4; 
            } else {
                // 대기권 안쪽: 선형 보간으로 매핑
                const pct = (satR - RE) / H_ATM;
                const safePct = Math.max(0, pct);
                satPixelR = r_earth_pixel + safePct * h_pixel;
            }

            const sx = cx + satPixelR * Math.cos(satAngle);
            const sy = cy + satPixelR * Math.sin(satAngle);

            if (!isAtmosphereEntered) {
                // 대기권 진입 전: 단일 점 위성체
                ctx.beginPath();
                ctx.arc(sx, sy, 5, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                // 코어 하이라이트
                ctx.beginPath();
                ctx.arc(sx, sy, 2, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
            } else {
                // 대기권 진입 후: 파편 면적(호 형태) 시각화변환
                // 대기권 진입각을 기반으로 공식 계산: L = k_break / sin(gamma)
                // 호의 각도 크기 = L / RE
                const arcAngleWidth = finalArcLength / RE;

                ctx.beginPath();
                ctx.arc(cx, cy, satPixelR, satAngle - arcAngleWidth/2, satAngle + arcAngleWidth/2);
                ctx.strokeStyle = '#ff5252';
                ctx.lineWidth = 4;
                ctx.stroke();
            }
        }

        // --- 애니메이션 메인 루프 ---
        let lastTime = 0;
        function animate(timestamp) {
            if (!isRunning) return;
            if (!lastTime) lastTime = timestamp;
            
            // 프레임 타임 계산 (초 단위)
            let dt = (timestamp - lastTime) / 1000;
            if (dt > 0.1) dt = 0.1; // 브라우저 백그라운드 탭 다운 방지
            lastTime = timestamp;

            const p = satData[currentSat];

            if (!isDeorbiting) {
                // 페이즈 1: 원운동 상태 (실제 시간 흐름 기준)
                simTime += dt;
                
                // 원궤도 등속 연산
                const v0 = Math.sqrt(MU / satR);
                satAngle += (v0 / satR) * (dt * timeScale); // 시각적 스피드를 위해 스케일 매핑
                updateCartesian();

                // 가상 수명 도달 완료 체크
                if (simTime >= p.tau_life) {
                    isDeorbiting = true;
                    // 정확한 대척점 위치 강제 동기화 (오차 보정)
                    satAngle = START_ANGLE;
                    satR = RE + p.h0;
                    updateCartesian();

                    // 역추진 감속 적용
                    const v0_actual = Math.sqrt(MU / satR);
                    const va = v0_actual - dv;
                    satV_r = 0;
                    satV_theta = va; 
                }
            } else {
                // 페이즈 2: 역추진 및 낙하 상태 (가속 물리 법칙 계산 적용)
                deorbitTime += dt;
                physicsStep(dt * timeScale);

                // 대기권 진입 순간 최초 1회만 최종 파편 호 길이 선행 확정 계산
                if (satR <= R_ATM && finalArcLength === 0) {
                    const v_mag = Math.sqrt(satV_r * satV_r + satV_theta * satV_theta);
                    // 진입각 gamma: 속도 벡터와 지평선(수직벡터의 직각) 사이의 각도
                    // sin(gamma) = |v_r| / v_mag
                    entryGamma = Math.abs(satV_r) / v_mag;
                    if (entryGamma < 0.01) entryGamma = 0.01; // Zero 분모 방지 방어코드

                    finalArcLength = p.k_break / entryGamma;
                }

                // 실패 조건 유저 기준 역추진 시작 후 화면 시간 2초 초과 체크
                if (deorbitTime >= 2.0 && satR > RE) {
                    endGame(false);
                    return;
                }
            }

            // 지표면 충돌 판정
            if (satR <= RE) {
                satR = RE;
                updateCartesian();
                checkLandingDecision();
                return;
            }

            drawScene();

            if (!isFinished) {
                requestAnimationFrame(animate);
            }
        }

        // --- 최종 판정 로직 ---
        function checkLandingDecision() {
            // 파편 호의 중심각은 최종 도달한 satAngle입니다.
            // 파편의 절반 각도 너비 계산
            const arcAngleWidth = finalArcLength / RE;
            const halfArc = arcAngleWidth / 2;

            const finalMinAngle = satAngle - halfArc;
            const finalMaxAngle = satAngle + halfArc;

            // 포인트 니모의 영역 경계 범위 계산
            const nemoHalfAngle = R_NEMO / RE;
            const nemoMinAngle = TARGET_ANGLE - nemoHalfAngle;
            const nemoMaxAngle = TARGET_ANGLE + nemoHalfAngle;

            // 조건: 파편 영역 전체(Min과 Max 모두)가 포인트 니모 영역 내부에 완벽히 포함되어야 함
            const isSuccess = (finalMinAngle >= nemoMinAngle) && (finalMaxAngle <= nemoMaxAngle);
            endGame(isSuccess);
        }

        function endGame(isSuccess) {
            isFinished = true;
            isRunning = false;
            drawScene(); // 최종 상태 1프레임 고정 출력

            // 결과 안내 텍스트 노출
            resultOverlay.style.display = 'block';
            if (isSuccess) {
                resultOverlay.textContent = 'SUCCESS';
                resultOverlay.className = 'success';
            } else {
                resultOverlay.textContent = 'FAIL';
                resultOverlay.className = 'fail';
            }

            // 판정 완료 2초 뒤 리셋 버튼 활성화 노출
            setTimeout(() => {
                btnStart.style.display = 'none';
                btnReset.style.display = 'block';
            }, 2000);
        }

        // 초기 구동 실행
        initSimulation();
    </script>
</body>
</html>
