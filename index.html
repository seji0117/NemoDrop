<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Deorbit Simulation</title>
    <style>
        /* CSS Reset 및 Tailwind 유사 유틸리티 클래스 */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            padding: 1rem;
            gap: 1rem;
        }
        @media (min-width: 1024px) {
            .container { flex-direction: row; }
        }

        /* 왼쪽 사이드바 (영역 1 ~ 5) */
        .sidebar {
            width: 100%;
            background-color: #111827;
            border: 1px solid #1f2937;
            border-radius: 0.75rem;
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            overflow-y: auto;
        }
        @media (min-width: 1024px) {
            .sidebar { width: 20rem; flex-shrink: 0; }
        }

        .header h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.25rem; display: flex; align-items: center; gap: 0.5rem; }
        .header p { font-size: 0.875rem; color: #9ca3af; }

        .form-group label { display: block; font-size: 0.875rem; font-weight: 600; color: #d1d5db; margin-bottom: 0.5rem; }
        .form-control {
            width: 100%; padding: 0.625rem; background-color: #1f2937; color: white;
            border: 1px solid #374151; border-radius: 0.5rem; outline: none; font-size: 0.875rem;
        }

        /* 메타데이터 패널 */
        .meta-panel { background-color: #030712; border-radius: 0.5rem; padding: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; }
        .meta-row { display: flex; justify-content: space-between; font-size: 0.75rem; color: #9ca3af; }
        .meta-row span:last-child { color: #f3f4f6; font-family: monospace; font-weight: 600; }

        /* 슬라이더 영역 */
        .slider-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
        .slider-header span { font-size: 0.875rem; font-weight: 600; }
        .slider-value { color: #3b82f6; font-family: monospace; font-size: 1.125rem !important; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: #3b82f6; }

        /* 버튼 영역 */
        .btn-group { display: flex; gap: 0.5rem; }
        .btn {
            padding: 0.75rem 1rem; border: none; border-radius: 0.5rem; font-weight: 600; cursor: pointer;
            transition: opacity 0.2s; font-size: 0.875rem; color: white; text-align: center;
        }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-main { flex: 1; background-color: #2563eb; }
        .btn-reset { width: 5rem; background-color: #4b5563; }

        /* 모노스페이스 모니터링 패널 */
        .monitor-panel { background-color: #000; border-radius: 0.5rem; padding: 0.75rem; border: 1px solid #1f2937; flex-grow: 1; display: flex; flex-direction: column; justify-content: flex-end; }
        .monitor-row { font-family: 'Courier New', Courier, monospace; font-size: 0.75rem; color: #10b981; margin-bottom: 0.25rem; display: flex; justify-content: space-between; }
        .monitor-row.standby { color: #6b7280; }
        .monitor-row.active { color: #f59e0b; }

        /* 오른쪽 캔버스 영역 */
        .main-panel {
            flex: 1; background-color: #030712; border: 1px solid #1f2937; border-radius: 0.75rem;
            position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center;
        }
        canvas { display: block; max-width: 100%; max-height: 100%; }

        /* 결과 오버레이 */
        .overlay {
            position: absolute; inset: 0; background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px);
            display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10;
        }
        .overlay.active { display: flex; }
        .result-title { font-size: 4rem; font-weight: 900; letter-spacing: 0.1em; margin-bottom: 1rem; }
        .result-title.success { color: #10b981; text-shadow: 0 0 20px rgba(16, 185, 129, 0.5); }
        .result-title.fail { color: #ef4444; text-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
        .result-desc { font-size: 1.125rem; color: #d1d5db; margin-bottom: 2rem; max-width: 80%; text-align: center; line-height: 1.6; }
        .btn-retry { background-color: white; color: black; border-radius: 9999px; padding: 0.75rem 2rem; font-size: 1rem; }
    </style>
</head>
<body>

<div class="container">
    <aside class="sidebar">
        <div class="header">
            <h1>☄️ Deorbit Control</h1>
            <p>Target: Point Nemo (Oceanic Pole of Inaccessibility)</p>
        </div>

        <div class="form-group">
            <label for="satSelect">Target Object</label>
            <select id="satSelect" class="form-control">
                <option value="sputnik">Sputnik 1 (소형)</option>
                <option value="mir">Mir Space Station (중형)</option>
                <option value="iss">International Space Station (초대형)</option>
            </select>
        </div>

        <div class="meta-panel" id="metaPanel">
            </div>

        <div>
            <div class="slider-header">
                <span style="color: #d1d5db;">Deceleration (Δv)</span>
                <span class="slider-value" id="dvValue">150</span>
            </div>
            <input type="range" id="dvSlider" min="10" max="300" value="150" step="1">
        </div>

        <div class="btn-group">
            <button class="btn btn-main" id="btnLaunch">INITIATE DEORBIT</button>
            <button class="btn btn-reset" id="btnReset">RST</button>
        </div>

        <div class="monitor-panel" id="monitorPanel">
            <div class="monitor-row" id="mon-sys"><span>SYS_STATUS</span><span>[NOMINAL]</span></div>
            <div class="monitor-row standby" id="mon-trgt"><span>TARGET_LOCK</span><span>[PT. NEMO]</span></div>
            <div class="monitor-row standby" id="mon-traj"><span>TRAJECTORY</span><span>[PREDICTING]</span></div>
            <div class="monitor-row standby" id="mon-atmo"><span>ATMO_ENTRY</span><span>[STANDBY]</span></div>
            <div class="monitor-row standby" id="mon-time"><span>FALL_TIMER</span><span>[WAITING]</span></div>
        </div>
    </aside>

    <main class="main-panel" id="canvasContainer">
        <canvas id="simCanvas"></canvas>
        
        <div class="overlay" id="resultOverlay">
            <h2 class="result-title" id="resultTitle">SUCCESS</h2>
            <p class="result-desc" id="resultDesc">파편이 포인트 니모 영역 내에 안전하게 낙하했습니다.</p>
            <button class="btn btn-retry" id="btnRetry">Acknowledge & Restart</button>
        </div>
    </main>
</div>

<script>
/**
 * 물리 기반 위성 낙하 시뮬레이션
 * 요구사항에 따른 물리량 및 공식 반영
 */

// --- 1. 시뮬레이션 상수 및 스케일 ---
const R_EARTH = 150;           // 지구 반지름 (픽셀)
const H_ATMO = 30;             // 대기권 두께 (R = 5 * h 조건 만족: 150 = 5 * 30)
const R_ATMO = R_EARTH + H_ATMO; // 대기권 경계 반경 (180)
const R_ORBIT = 185;           // 초기 원궤도 고도 (대기권 밖)
const GM = 1500000;            // 지구 중력 상수 (시뮬레이션 스케일)
const V_ORBIT = Math.sqrt(GM / R_ORBIT); // 초기 원궤도 속도 (약 90)

// 포인트 니모: 화면 하단(Math.PI/2) 기준
// 실제 2688km / 지구 둘레 반영 시 약 0.42 라디안 스팬
const NEMO_ANGLE = Math.PI / 2;
const NEMO_SPAN = 0.42; 

// 파편화 스케일 인자 (k_break 비례)
const K_SCALE = 2.0e-7;

// --- 2. 위성 데이터베이스 ---
const satellites = {
    sputnik: {
        name: "Sputnik 1", mass: "83.6 kg", area: "0.26 m²", cd: 2.1,
        kBreak: 5000, color: "#9ca3af"
    },
    mir: {
        name: "Mir Station", mass: "130,000 kg", area: "350 m²", cd: 2.3,
        kBreak: 150000, color: "#fcd34d"
    },
    iss: {
        name: "ISS", mass: "450,000 kg", area: "2,200 m²", cd: 2.6,
        kBreak: 400000, color: "#f87171"
    }
};

// --- 3. 글로벌 상태 관리 ---
const STATE = { IDLE: 0, ORBITING: 1, FALLING: 2, RESULT: 3 };
let currentState = STATE.IDLE;
let currentSat = satellites.sputnik;
let deltaVUser = 150;

// 물리 엔진 변수
let satX = 0, satY = 0;
let satVx = 0, satVy = 0;
let orbitTime = 0;        // 원궤도 회전 진행 시간
const ORBIT_TARGET_TIME = 3.0; // 3초 뒤 반대편 도달
let fallTime = 0;         // 낙하 진행 시간 (실제 시간 측정용)
let lastTimestamp = 0;
let hasEnteredAtmo = false;
let spreadAngle = 0;      // 파편 확산 각도 (W)

// DOM 요소
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('canvasContainer');
const overlay = document.getElementById('resultOverlay');

// --- 4. 초기화 및 이벤트 바인딩 ---
function init() {
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    document.getElementById('satSelect').addEventListener('change', (e) => {
        currentSat = satellites[e.target.value];
        updateMetaPanel();
        if (currentState === STATE.IDLE) drawFrame();
    });

    document.getElementById('dvSlider').addEventListener('input', (e) => {
        deltaVUser = parseInt(e.target.value);
        document.getElementById('dvValue').textContent = deltaVUser;
        if (currentState === STATE.IDLE) drawFrame(); // 예측 궤적 실시간 업데이트
    });

    document.getElementById('btnLaunch').addEventListener('click', startDeorbitSequence);
    document.getElementById('btnReset').addEventListener('click', resetSimulation);
    document.getElementById('btnRetry').addEventListener('click', resetSimulation);

    updateMetaPanel();
    resetSimulation();
    requestAnimationFrame(gameLoop);
}

function resizeCanvas() {
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;
    if (currentState === STATE.IDLE) drawFrame();
}

function updateMetaPanel() {
    const p = document.getElementById('metaPanel');
    p.innerHTML = `
        <div class="meta-row"><span>Mass ($m_0$)</span><span>${currentSat.mass}</span></div>
        <div class="meta-row"><span>Proj. Area ($A$)</span><span>${currentSat.area}</span></div>
        <div class="meta-row"><span>Drag Coeff ($C_d$)</span><span>${currentSat.cd}</span></div>
        <div class="meta-row"><span>Breakup Coeff</span><span>${currentSat.kBreak.toLocaleString()}</span></div>
        <div class="meta-row"><span>Structure</span><span style="color:${currentSat.color}">ANALYZED</span></div>
    `;
}

function updateMonitor(sys, trgt, traj, atmo, timeMode) {
    const updateRow = (id, text, stateClass) => {
        const el = document.getElementById(id);
        el.className = `monitor-row ${stateClass}`;
        el.children[1].textContent = `[${text}]`;
    };
    updateRow('mon-sys', sys.text, sys.cls);
    updateRow('mon-trgt', trgt.text, trgt.cls);
    updateRow('mon-traj', traj.text, traj.cls);
    updateRow('mon-atmo', atmo.text, atmo.cls);
    updateRow('mon-time', timeMode.text, timeMode.cls);
}

// --- 5. 물리 엔진 로직 ---

function startDeorbitSequence() {
    if (currentState !== STATE.IDLE) return;
    currentState = STATE.ORBITING;
    orbitTime = 0;
    
    // 버튼 비활성화
    document.getElementById('btnLaunch').disabled = true;
    document.getElementById('satSelect').disabled = true;
    document.getElementById('dvSlider').disabled = true;
    
    updateMonitor(
        {text: "ACTIVE", cls: "active"}, {text: "LOCKED", cls: ""},
        {text: "ALIGNING", cls: "active"}, {text: "STANDBY", cls: "standby"},
        {text: "WAITING", cls: "standby"}
    );
}

function triggerFall() {
    currentState = STATE.FALLING;
    fallTime = 0;
    hasEnteredAtmo = false;
    spreadAngle = 0;
    lastTimestamp = performance.now();

    // 상단(위치: 반대편)에 도달
    satX = 0;
    satY = -R_ORBIT;
    
    // 유저 입력 $\Delta v$ (10~300)을 시뮬레이션 스케일(0.5 ~ 15)로 매핑
    const mappedDv = 0.5 + ((deltaVUser - 10) / 290) * 14.5;
    satVx = V_ORBIT - mappedDv; // x축 속도 감소 (감속)
    satVy = 0;
    
    updateMonitor(
        {text: "RETRO-FIRE", cls: "active"}, {text: "LOCKED", cls: ""},
        {text: "DEORBITING", cls: "active"}, {text: "APPROACHING", cls: "active"},
        {text: "T-MINUS 2S", cls: "active"}
    );
}

// 매 프레임 실행되는 메인 루프
function gameLoop(timestamp) {
    if (currentState === STATE.ORBITING || currentState === STATE.FALLING) {
        updatePhysics(timestamp);
        drawFrame();
    }
    requestAnimationFrame(gameLoop);
}

function updatePhysics(timestamp) {
    if (currentState === STATE.ORBITING) {
        // 1. 원운동 단계 (상대 수명 제어) - 시작점에서 3초만에 반대편 도달
        orbitTime += 1/60; // 초 단위 근사
        // 시작 위치: 하단 (Math.PI/2). 목표 위치: 상단 (-Math.PI/2)
        const angle = (Math.PI / 2) - Math.PI * (orbitTime / ORBIT_TARGET_TIME);
        satX = Math.cos(angle) * R_ORBIT;
        satY = Math.sin(angle) * R_ORBIT;

        if (orbitTime >= ORBIT_TARGET_TIME) {
            triggerFall();
        }
    } 
    else if (currentState === STATE.FALLING) {
        // 2. 역추진 낙하 (실제 시간 기반 2초 타이머)
        let dt = (timestamp - lastTimestamp) / 1000;
        if (dt > 0.1) dt = 0.1; // 브라우저 탭 이동 등 예외 처리
        lastTimestamp = timestamp;
        fallTime += dt;

        // 시뮬레이션 내부 루프 (안정성을 위해 여러 번 쪼개서 연산)
        const subSteps = 5;
        const simDt = 0.05; // 빠른 낙하 시각화를 위한 고정 스텝
        
        for (let i = 0; i < subSteps; i++) {
            const r = Math.sqrt(satX*satX + satY*satY);
            
            // 만약 내부 타이머 2초가 넘었는데도 지구에 안 닿았다면 실패
            if (fallTime > 2.0 && r > R_EARTH) {
                showResult(false, "Deceleration Failed: 지구 표면 도달 전 궤도 고착 (시간 초과)");
                return;
            }
            
            // 만약 우주 밖으로 이탈하면 실패
            if (r > R_ORBIT * 1.5) {
                showResult(false, "Trajectory Lost: 우주 공간으로 이탈했습니다.");
                return;
            }

            // 중력 계산: F = GM / r^2
            const ax = -GM * satX / (r * r * r);
            const ay = -GM * satY / (r * r * r);
            
            satVx += ax * simDt;
            satVy += ay * simDt;
            
            // 대기권 진입 처리
            if (r <= R_ATMO) {
                if (!hasEnteredAtmo) {
                    hasEnteredAtmo = true;
                    // 진입각(gamma) 계산: 속도 벡터와 지평선(접선) 간의 각도
                    const vMag = Math.sqrt(satVx*satVx + satVy*satVy);
                    // r 벡터의 반대 방향(지구 중심을 향함)과 v 벡터의 내적으로 sin(gamma) 도출
                    let sinGamma = -(satVx * satX + satVy * satY) / (vMag * r);
                    sinGamma = Math.max(0.01, Math.min(1.0, sinGamma)); // 0 방지
                    
                    // 파편 호의 길이 공식: L_final = k_break / sin(gamma)
                    spreadAngle = (currentSat.kBreak * K_SCALE) / sinGamma;
                    
                    updateMonitor(
                        {text: "WARNING", cls: "active"}, {text: "LOCKED", cls: ""},
                        {text: "DRAG_ACTIVE", cls: "active"}, {text: "ENTRY_CONFIRM", cls: ""},
                        {text: "T-MINUS < 2S", cls: "active"}
                    );
                }
                
                // 단순화된 대기 저항 적용 (궤적을 휘게 만듦)
                satVx *= 0.995;
                satVy *= 0.995;
            }
            
            satX += satVx * simDt;
            satY += satVy * simDt;
            
            // 지표면 충돌 판정
            if (Math.sqrt(satX*satX + satY*satY) <= R_EARTH) {
                checkLanding();
                return;
            }
        }
    }
}

function checkLanding() {
    currentState = STATE.RESULT;
    
    // 최종 충돌 각도
    const hitAngle = Math.atan2(satY, satX);
    
    // 파편 호(Arc)의 범위 계산
    const hitStart = hitAngle - spreadAngle / 2;
    const hitEnd = hitAngle + spreadAngle / 2;
    
    // 포인트 니모 범위
    const nemoStart = NEMO_ANGLE - NEMO_SPAN / 2;
    const nemoEnd = NEMO_ANGLE + NEMO_SPAN / 2;
    
    // 정규화 함수 (각도를 0~2PI로)
    const normalize = (a) => {
        let res = a % (Math.PI * 2);
        if (res < 0) res += Math.PI * 2;
        return res;
    };
    
    // 완전 포함 여부 로직 (간략화)
    // 낙하 위치가 대부분 하단 근처이므로 단순 비교 가능
    let success = false;
    let msg = "";
    
    if (hitStart >= nemoStart && hitEnd <= nemoEnd) {
        success = true;
        msg = "파편 전체가 포인트 니모 영역(합격 반경) 내에 완벽히 분산 낙하했습니다.";
        updateMonitor(
            {text: "SECURE", cls: ""}, {text: "HIT", cls: ""},
            {text: "TERMINATED", cls: ""}, {text: "DESTROYED", cls: ""},
            {text: "LIFESPAN: END", cls: ""}
        );
    } else {
        msg = "파편 궤적이 포인트 니모 합격 반경을 이탈하여 해상 통제에 실패했습니다.";
        updateMonitor(
            {text: "CRITICAL", cls: "active"}, {text: "MISSED", cls: "active"},
            {text: "TERMINATED", cls: ""}, {text: "DESTROYED", cls: ""},
            {text: "HAZARD_DETECTED", cls: "active"}
        );
    }
    
    showResult(success, msg);
    drawFrame(); // 최종 상태 렌더링
}

// --- 6. 렌더링 (Canvas 시각화) ---

function drawFrame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    
    ctx.save();
    ctx.translate(cx, cy);

    // 지구 그리기
    ctx.beginPath();
    ctx.arc(0, 0, R_EARTH, 0, Math.PI * 2);
    ctx.fillStyle = '#1e3a8a';
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.strokeStyle = '#1e40af';
    ctx.stroke();

    // 대기권 그리기
    ctx.beginPath();
    ctx.arc(0, 0, R_ATMO, 0, Math.PI * 2);
    ctx.strokeStyle = '#38bdf8';
    ctx.globalAlpha = 0.2;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.globalAlpha = 1.0;

    // 포인트 니모 (목표 호)
    ctx.beginPath();
    ctx.arc(0, 0, R_EARTH, NEMO_ANGLE - NEMO_SPAN/2, NEMO_ANGLE + NEMO_SPAN/2);
    ctx.strokeStyle = '#10b981';
    ctx.lineWidth = 6;
    ctx.stroke();
    
    // 예측 궤적 선 (Idle 상태에서 유저가 슬라이더 조절 시)
    if (currentState === STATE.IDLE) {
        drawPredictedTrajectory(ctx);
        // 대기 위치 (포인트 니모 위치에서 시작 대기)
        drawSatelliteObj(ctx, 0, R_ORBIT);
    } 
    else if (currentState === STATE.ORBITING || currentState === STATE.FALLING || currentState === STATE.RESULT) {
        // 위성/파편 그리기
        if (hasEnteredAtmo) {
            // 파편 면적(호)로 변환
            const currentAngle = Math.atan2(satY, satX);
            const currentR = Math.sqrt(satX*satX + satY*satY);
            ctx.beginPath();
            ctx.arc(0, 0, currentR, currentAngle - spreadAngle/2, currentAngle + spreadAngle/2);
            ctx.strokeStyle = currentSat.color;
            ctx.lineWidth = 4;
            ctx.stroke();
            
            // 파편 효과 시각화 (희미한 배경 호)
            ctx.beginPath();
            ctx.arc(0, 0, currentR + 2, currentAngle - spreadAngle/2, currentAngle + spreadAngle/2);
            ctx.strokeStyle = '#ef4444';
            ctx.globalAlpha = 0.5;
            ctx.lineWidth = 8;
            ctx.stroke();
            ctx.globalAlpha = 1.0;
        } else {
            drawSatelliteObj(ctx, satX, satY);
        }
    }

    ctx.restore();
}

// 궤적 예측용 타원 기하학 계산 및 렌더링
function drawPredictedTrajectory(ctx) {
    const mappedDv = 0.5 + ((deltaVUser - 10) / 290) * 14.5;
    const va = V_ORBIT - mappedDv;
    
    // 타원 반장축(a) 및 이심률(e) 공식
    const a = (GM * R_ORBIT) / (2 * GM - R_ORBIT * va * va);
    const e = (R_ORBIT / a) - 1;
    
    if (a > 0 && e >= 0 && e < 1) {
        const b = a * Math.sqrt(1 - e * e);
        const cy = a - R_ORBIT; // 초점(지구중심) 기준 타원의 중심 y좌표
        
        ctx.beginPath();
        ctx.ellipse(0, cy, b, a, 0, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.setLineDash([5, 5]);
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.setLineDash([]);
    }
}

function drawSatelliteObj(ctx, x, y) {
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = currentSat.color;
    ctx.fill();
    ctx.shadowColor = currentSat.color;
    ctx.shadowBlur = 10;
    ctx.fill();
    ctx.shadowBlur = 0;
}

// --- 7. 유틸리티 및 결과창 제어 ---

function showResult(isSuccess, message) {
    overlay.classList.add('active');
    const titleEl = document.getElementById('resultTitle');
    
    if (isSuccess) {
        titleEl.textContent = 'SUCCESS';
        titleEl.className = 'result-title success';
    } else {
        titleEl.textContent = 'FAIL';
        titleEl.className = 'result-title fail';
    }
    document.getElementById('resultDesc').textContent = message;
}

function resetSimulation() {
    currentState = STATE.IDLE;
    orbitTime = 0;
    fallTime = 0;
    hasEnteredAtmo = false;
    overlay.classList.remove('active');
    
    document.getElementById('btnLaunch').disabled = false;
    document.getElementById('satSelect').disabled = false;
    document.getElementById('dvSlider').disabled = false;
    
    updateMonitor(
        {text: "NOMINAL", cls: ""}, {text: "PT. NEMO", cls: "standby"},
        {text: "COMPUTING", cls: "standby"}, {text: "STANDBY", cls: "standby"},
        {text: "WAITING", cls: "standby"}
    );
    
    drawFrame();
}

window.onload = init;
</script>
