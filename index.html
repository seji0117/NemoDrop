<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>위성 대기권 재진입 시뮬레이션</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f9; margin: 0; padding: 20px; }
        canvas { background-color: white; border: 1px solid #ccc; border-radius: 10px; margin-top: 20px; }
        .controls { margin-top: 15px; padding: 15px; background: white; display: inline-block; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .control-group { margin-bottom: 10px; }
        button { padding: 8px 15px; margin: 0 5px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        #startBtn { background-color: #007bff; color: white; }
        #resetBtn { background-color: #dc3545; color: white; }
        #resultText { font-size: 24px; font-weight: bold; margin-top: 15px; height: 30px; }
    </style>
</head>
<body>

    <h2>위성 Deorbit 시뮬레이터</h2>
    
    <div class="controls">
        <div class="control-group">
            <label><input type="radio" name="satellite" value="Sputnik 1" checked> 스푸트니크 1호</label>
            <label><input type="radio" name="satellite" value="Mir"> 미르 우주정거장</label>
            <label><input type="radio" name="satellite" value="ISS"> 국제우주정거장(ISS)</label>
        </div>
        <div class="control-group">
            <label for="dvSlider">감속량 (Δv): <span id="dvValue">10</span> m/s</label><br>
            <input type="range" id="dvSlider" min="10" max="300" value="10" style="width: 300px;">
        </div>
        <div>
            <button id="startBtn">Start</button>
            <button id="resetBtn">Reset</button>
        </div>
    </div>

    <div id="resultText"></div>
    <canvas id="simCanvas" width="600" height="600"></canvas>

    <script>
        // 1. 물리 상수 설정
        const MU = 3.986e14;
        const RE = 6378000;
        const H0 = 400000;
        const R0 = RE + H0;
        const V0 = Math.sqrt(MU / R0);
        const RHO0 = 1.225;
        const H_SCALE = 7500;
        const R_NEMO = 2688000;
        const ATM_H = 100000;

        const SATELLITES = {
            'Sputnik 1': { m: 83.6, A: 0.26, Cd: 2.1, tau: 1000, k: 5000 },
            'Mir':       { m: 130000, A: 350, Cd: 2.3, tau: 2000, k: 150000 },
            'ISS':       { m: 450000, A: 2200, Cd: 2.6, tau: 3000, k: 400000 }
        };

        // 2. 캔버스 및 렌더링 설정
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const SCALE = (canvas.width / 2 - 20) / (R0 + 200000); 
        const CX = canvas.width / 2;
        const CY = canvas.height / 2;

        // 3. 상태 변수
        let state = 'IDLE'; // IDLE, ORBITING, DEORBITING, DONE
        let satX = 0, satY = -R0, satVx = V0, satVy = 0;
        let selectedSat = 'Sputnik 1';
        let dV = 10;
        let orbitStartTime = 0;
        let deorbitStartTime = 0;
        let enteredAtm = false;
        let L_final = 0;
        let animId;

        // UI 요소 연결
        const dvSlider = document.getElementById('dvSlider');
        const dvValue = document.getElementById('dvValue');
        const resultText = document.getElementById('resultText');
        
        document.querySelectorAll('input[name="satellite"]').forEach(radio => {
            radio.addEventListener('change', (e) => selectedSat = e.target.value);
        });

        dvSlider.addEventListener('input', (e) => {
            dV = parseFloat(e.target.value);
            dvValue.innerText = dV;
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            if (state === 'IDLE' || state === 'DONE') {
                state = 'ORBITING';
                orbitStartTime = Date.now();
                enteredAtm = false;
                resultText.innerText = "";
                satX = 0; satY = -R0; satVx = V0; satVy = 0;
                if(animId) cancelAnimationFrame(animId);
                loop();
            }
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            state = 'IDLE';
            resultText.innerText = "";
            if(animId) cancelAnimationFrame(animId);
            drawScene();
        });

        // 4. 물리 시뮬레이션 (RK4)
        function rk4Step(dt) {
            const sat = SATELLITES[selectedSat];
            
            function derivatives(x, y, vx, vy) {
                const r = Math.hypot(x, y);
                const v = Math.hypot(vx, vy);
                let ax = -MU * x / Math.pow(r, 3);
                let ay = -MU * y / Math.pow(r, 3);
                
                if (r < RE + ATM_H) {
                    const h = r - RE;
                    const rho = RHO0 * Math.exp(-h / H_SCALE);
                    const drag = 0.5 * rho * v * (sat.Cd * sat.A / sat.m);
                    ax -= drag * (vx / v);
                    ay -= drag * (vy / v);
                }
                return { dx: vx, dy: vy, dvx: ax, dvy: ay };
            }

            const k1 = derivatives(satX, satY, satVx, satVy);
            const k2 = derivatives(satX + k1.dx*dt/2, satY + k1.dy*dt/2, satVx + k1.dvx*dt/2, satVy + k1.dvy*dt/2);
            const k3 = derivatives(satX + k2.dx*dt/2, satY + k2.dy*dt/2, satVx + k2.dvx*dt/2, satVy + k2.dvy*dt/2);
            const k4 = derivatives(satX + k3.dx*dt, satY + k3.dy*dt, satVx + k3.dvx*dt, satVy + k3.dvy*dt);

            satX += (dt / 6) * (k1.dx + 2*k2.dx + 2*k3.dx + k4.dx);
            satY += (dt / 6) * (k1.dy + 2*k2.dy + 2*k3.dy + k4.dy);
            satVx += (dt / 6) * (k1.dvx + 2*k2.dvx + 2*k3.dvx + k4.dvx);
            satVy += (dt / 6) * (k1.dvy + 2*k2.dvy + 2*k3.dvy + k4.dvy);
        }

        // 5. 그리기 로직
        function drawScene() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 대기권 (연한 하늘색)
            ctx.beginPath();
            ctx.arc(CX, CY, (RE + ATM_H) * SCALE, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(173, 216, 230, 0.3)';
            ctx.fill();

            // 지구 (파란색)
            ctx.beginPath();
            ctx.arc(CX, CY, RE * SCALE, 0, Math.PI * 2);
            ctx.fillStyle = '#1f77b4';
            ctx.fill();

            // 포인트 니모 (초록색 호 - 바닥 중앙)
            const nemoAngle = R_NEMO / RE;
            ctx.beginPath();
            ctx.arc(CX, CY, RE * SCALE, Math.PI/2 - nemoAngle, Math.PI/2 + nemoAngle);
            ctx.strokeStyle = 'lime';
            ctx.lineWidth = 5;
            ctx.stroke();

            // 위성 또는 파편 그리기
            if (state !== 'IDLE') {
                const rCurrent = Math.hypot(satX, satY);
                if (enteredAtm) {
                    // 파편 호(Arc)로 그리기
                    const dTheta = L_final / rCurrent;
                    const thetaCenter = Math.atan2(satY, satX);
                    ctx.beginPath();
                    ctx.arc(CX, CY, rCurrent * SCALE, thetaCenter - dTheta/2, thetaCenter + dTheta/2);
                    ctx.strokeStyle = 'orange';
                    ctx.lineWidth = 4;
                    ctx.stroke();
                } else {
                    // 점으로 그리기
                    ctx.beginPath();
                    ctx.arc(CX + satX * SCALE, CY + satY * SCALE, 4, 0, Math.PI * 2);
                    ctx.fillStyle = 'black';
                    ctx.fill();
                }
            }
        }

        // 6. 메인 게임 루프
        function loop() {
            if (state === 'DONE') {
                drawScene();
                return;
            }

            const now = Date.now();

            // 궤도 도는 중 (상대 수명 처리)
            if (state === 'ORBITING') {
                const tau = SATELLITES[selectedSat].tau;
                const elapsed = now - orbitStartTime;
                const progress = Math.min(elapsed / tau, 1.0);
                
                // 위(y=-R0)에서 아래(y=R0, 포인트 니모 대척점)로 반바퀴 회전
                const theta = -Math.PI/2 + progress * Math.PI;
                satX = R0 * Math.cos(theta);
                satY = R0 * Math.sin(theta);

                if (elapsed >= tau) {
                    state = 'DEORBITING';
                    deorbitStartTime = Date.now();
                    const v_new = V0 - dV; 
                    satVx = -v_new; // 반대 방향으로 역추진
                    satVy = 0;
                }
            } 
            // 감속 및 낙하 중
            else if (state === 'DEORBITING') {
                // 현실 시간 2초 초과 시 실패
                if (now - deorbitStartTime > 2000) {
                    resultText.innerText = "FAIL (시간 초과 / 궤도 이탈)";
                    resultText.style.color = "red";
                    state = 'DONE';
                }

                // 1프레임당 여러 번 물리 연산 (빠른 시각화)
                const dt = 2.0; 
                for (let i = 0; i < 50; i++) {
                    rk4Step(dt);
                    const r = Math.hypot(satX, satY);

                    // 대기권 진입 순간 계산
                    if (r < RE + ATM_H && !enteredAtm) {
                        enteredAtm = true;
                        const v_sq = satVx**2 + satVy**2;
                        const E = v_sq / 2 - MU / r;
                        const v_entry = Math.sqrt(Math.max(0, 2 * (E + MU / (RE + ATM_H))));
                        
                        const h_ang = satX * satVy - satY * satVx;
                        const v_h = h_ang / (RE + ATM_H);
                        const ratio = Math.max(-1.0, Math.min(1.0, Math.abs(v_h) / v_entry));
                        const gamma_entry = Math.max(Math.acos(ratio), 1e-6);
                        
                        L_final = SATELLITES[selectedSat].k / Math.sin(gamma_entry);
                    }

                    // 지표면(바다) 도달 확인
                    if (r <= RE) {
                        let thetaCenter = Math.atan2(satY, satX);
                        // 각도를 -PI ~ PI 기준으로 보정
                        if (thetaCenter < 0) thetaCenter += 2 * Math.PI; 
                        
                        // 포인트 니모는 PI/2 (아래쪽 중앙)
                        const targetTheta = Math.PI / 2;
                        const dTheta = L_final / RE;
                        const arcMin = thetaCenter - dTheta/2;
                        const arcMax = thetaCenter + dTheta/2;
                        
                        const nemoMin = targetTheta - (R_NEMO / RE);
                        const nemoMax = targetTheta + (R_NEMO / RE);

                        if (arcMin >= nemoMin && arcMax <= nemoMax) {
                            resultText.innerText = "SUCCESS";
                            resultText.style.color = "lime";
                        } else {
                            resultText.innerText = "FAIL";
                            resultText.style.color = "red";
                        }
                        state = 'DONE';
                        break;
                    }
                }
            }

            drawScene();
            if (state !== 'DONE') {
                animId = requestAnimationFrame(loop);
            }
        }

        // 초기 화면 그리기
        drawScene();
    </script>
</body>
</html>
