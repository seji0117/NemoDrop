<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satellite Deorbit Simulation</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            display: flex; 
            height: 100vh; 
            background-color: #050505; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* 좌측 UI 패널 */
        #ui-panel {
            width: 320px;
            background-color: #1a1a24;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            border-right: 1px solid #333;
            z-index: 10;
        }
        h2 { font-size: 1.2rem; color: #00ffcc; text-align: center; margin-bottom: 10px; }
        .control-group { display: flex; flex-direction: column; gap: 10px; }
        label { font-size: 0.9rem; color: #ccc; }
        
        .radio-group { display: flex; flex-direction: column; gap: 8px; }
        .radio-label {
            display: flex; align-items: center; gap: 8px;
            background: #2a2a35; padding: 10px; border-radius: 6px; cursor: pointer;
            transition: background 0.2s;
        }
        .radio-label:hover { background: #353545; }
        
        input[type="range"] { width: 100%; cursor: pointer; }
        .slider-val { font-weight: bold; color: #00ffcc; font-size: 1.1rem; text-align: right; }

        button {
            padding: 12px; font-size: 1rem; font-weight: bold; border: none; border-radius: 6px;
            cursor: pointer; transition: transform 0.1s, background 0.2s;
        }
        #btn-start { background-color: #00ffcc; color: #000; }
        #btn-start:hover { background-color: #00ccaa; }
        #btn-start:active { transform: scale(0.98); }
        
        #btn-reset { 
            background-color: #ff3366; color: #fff; 
            display: none; /* 결과 2초 후 표시 */
        }
        #btn-reset:hover { background-color: #cc2952; }

        /* 우측 시뮬레이션 캔버스 영역 */
        #canvas-container {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
        }

        /* 결과 오버레이 */
        #result-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 5px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .success { color: #00ffcc; }
        .fail { color: #ff3366; }
        .show { opacity: 1 !important; }

    </style>
</head>
<body>

    <div id="ui-panel">
        <h2>위성 낙하 시뮬레이션</h2>
        
        <div class="control-group">
            <label>대상 위성 선택</label>
            <div class="radio-group">
                <label class="radio-label">
                    <input type="radio" name="satellite" value="sputnik" checked>
                    스푸트니크 1호
                </label>
                <label class="radio-label">
                    <input type="radio" name="satellite" value="mir">
                    미르 우주정거장
                </label>
                <label class="radio-label">
                    <input type="radio" name="satellite" value="iss">
                    국제우주정거장 (ISS)
                </label>
            </div>
        </div>

        <div class="control-group">
            <label>감속량 (Δv)</label>
            <input type="range" id="dv-slider" min="10" max="300" value="150" step="1">
            <div class="slider-val"><span id="dv-display">150</span> m/s</div>
        </div>

        <button id="btn-start">시작 (Start)</button>
        <button id="btn-reset">리셋 (Reset)</button>
    </div>

    <div id="canvas-container">
        <canvas id="simCanvas"></canvas>
        <div id="result-overlay"></div>
    </div>
