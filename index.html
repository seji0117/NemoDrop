<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spacecraft Deorbit Simulation</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #121824;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #canvas-container {
            position: relative;
            margin-bottom: 20px;
        }

        canvas {
            background-color: #070a0f;
            border-radius: 8px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        #overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 4px;
            display: none;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            user-select: none;
        }

        .success { color: #2ecc71; }
        .fail { color: #e74c3c; }

        #controls {
            display: flex;
            gap: 20px;
            align-items: center;
            background: #1a2333;
            padding: 15px 25px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        select, input[type="range"], button {
            background: #253248;
            color: #fff;
            border: 1px solid #3b4f6e;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
            cursor: pointer;
        }

        input[type="range"] {
            width: 180px;
            padding: 0;
        }

        button {
            background: #3498db;
            border: none;
            font-weight: bold;
            padding: 10px 20px;
            transition: background 0.2s;
        }

        button:hover { background: #2980b9; }
        button:disabled { background: #555; cursor: not-allowed; }

        #reset-btn { background: #e67e22; }
        #reset-btn:hover { background: #d35400; }
    </style>
</head>
<body>

<div id="container">
    <div id="canvas-container">
        <canvas id="simCanvas" width="700" height="700"></canvas>
        <div id="overlay"></div>
    </div>

    <div id="controls">
        <div class="control-group">
            <select id="satSelect">
                <option value="sputnik">Sputnik 1</option>
                <option value="mir">Mir</option>
                <option value="iss">ISS</option>
            </select>
        </div>
        <div class="control-group">
            <input type="range" id="dvSlider" min="10" max="300" value="150">
        </div>
        <button id="start-btn">START</button>
        <button id="reset-btn" style="display:none;">RESET</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const startBtn = document.getElementById('start-btn');
    const resetBtn = document.getElementById('reset-btn');
    const satSelect = document.getElementById('satSelect');
    const dvSlider = document.getElementById('dvSlider');

    // 물리 상수
    const MU = 3.986e14;
    const RE = 6378000;
    const H0 = 400000;
    const R0 = RE + H0;
    const R_NEMO = 2688000;
    const R_ATM = RE + 100000;

    // 시뮬레이션 속도 인자 (물리 시간 / 실제 시간)
    const TIME_MULTIPLIER = 3800; 

    // 위성 데이터 정의
    const satellites = {
        sputnik: { m0: 83.6, A: 0.26, Cd: 2.1, tau: 1.0, k_break: 5000 },
        mir: { m0: 130000, A: 350, Cd: 2.3, tau: 2.0, k_break: 150000 },
        iss: { m0: 450000, A: 2200, Cd: 2.6, tau: 3.0, k_break: 400000 }
    };

    // 위치 기하 설정 (2D 평면화)
    // 포인트 니모 중심: 90도 (화면 아래쪽)
    // 낙하 시작 지점: 270도 (화면 위쪽)
    const THETA_NEMO = Math.PI / 2;
    const THETA_START = Math.PI * 1.5;
    const DNEMO = R_NEMO / RE; // 포인트니모 절반 호의 라디안 각도

    // 상태 변수
    let currentSat = satellites.sputnik;
    let dv = 150;
    let state = 'IDLE'; // IDLE, ORBIT, DESCENT, FINISHED
    let startTime = 0;
    let burnTime = 0;
    let lastTime = 0;

    // 위성 물리 상태
    let px = 0, py = 0;
    let vx = 0, vy = 0;
    let pathHistory = [];
    let enteredAtmosphere = false;
    let debrisWidthRad = 0;

    // 초기 원궤도 속도
    const V0 = Math.sqrt(MU / R0);
    const OMEGA0 = V0 / R0; // 각속도

    function init() {
        state = 'IDLE';
        overlay.style.display = 'none';
        startBtn.style.display = 'inline-block';
        startBtn.disabled = false;
        resetBtn.style.display = 'none';
        satSelect.disabled = false;
        dvSlider.disabled = false;
        pathHistory = [];
        enteredAtmosphere = false;
        debrisWidthRad = 0;
        draw();
    }

    function startSimulation() {
        currentSat = satellites[satSelect.value];
        dv = parseFloat(dvSlider.value);
        state = 'ORBIT';
        startTime = performance.now();
        lastTime = startTime;
        
        startBtn.disabled = true;
        satSelect.disabled = true;
        dvSlider.disabled = true;
        
        requestAnimationFrame(update);
    }

    function update(timestamp) {
        if (state !== 'ORBIT' && state !== 'DESCENT') return;

        let dtReal = (timestamp - lastTime) / 1000;
        lastTime = timestamp;

        // 프레임 드랍 방지용 캡
        if (dtReal > 0.1) dtReal = 0.1; 

        let totalElapsedReal = (timestamp - startTime) / 1000;

        if (state === 'ORBIT') {
            if (totalElapsedReal >= currentSat.tau) {
                // 역추진 단계 진입 (정확히 시작 지점인 상단 백터 설정)
                state = 'DESCENT';
                burnTime = timestamp;
                px = 0;
                py = -R0;
                vx = V0 - dv; // 반시계 방향 회전 중 상단에서의 속도는 우측(+x) 방향
                vy = 0;
            } else {
                // 수명 도달 시 정확히 시작점에 도달하도록 역산하여 초기 각도 및 궤도 갱신
                let theta = THETA_START - OMEGA0 * (currentSat.tau - totalElapsedReal) * TIME_MULTIPLIER;
                px = R0 * Math.cos(theta);
                py = R0 * Math.sin(theta);
            }
        } else if (state === 'DESCENT') {
            let burnElapsedReal = (timestamp - burnTime) / 1000;

            // 역추진 후 2초 경과 체크 타임아웃
            if (burnElapsedReal > 2.0) {
                endSimulation(false);
                return;
            }

            // 고정 물리 시간 스텝으로 수치해석 안정성 보장 (서브스테핑)
            let dtSimTotal = dtReal * TIME_MULTIPLIER;
            let substeps = 15;
            let dt = dtSimTotal / substeps;

            for (let i = 0; i < substeps; i++) {
                let r = Math.sqrt(px*px + py*py);
                if (r <= RE) {
                    checkLanding();
                    return;
                }

                let h = r - RE;
                // 중력 가속도
                let ax = -(MU * px) / (r * r * r);
                let ay = -(MU * py) / (r * r * r);

                // 대기 저항 처리
                if (h <= 100000) {
                    let v = Math.sqrt(vx*vx + vy*vy);
                    if (!enteredAtmosphere) {
                        enteredAtmosphere = true;
                        // 진입각 계산
                        let dot = px*vx + py*vy;
                        let sinGamma = Math.abs(dot) / (r * v);
                        sinGamma = Math.max(0.001, Math.min(1, sinGamma)); // 예외 예방 클램핑
                        let gammaEntry = Math.asin(sinGamma);
                        
                        // 파편 호 길이 계산 물리식 적용
                        let L_final = currentSat.k_break / Math.sin(gammaEntry);
                        debrisWidthRad = L_final / RE;
                    }

                    let rho = 1.225 * Math.exp(-h / 7500);
                    let ad = 0.5 * rho * v * v * (currentSat.Cd * currentSat.A / currentSat.m0);
                    
                    ax -= ad * (vx / v);
                    ay -= ad * (vy / v);
                }

                vx += ax * dt;
                vy += ay * dt;
                px += vx * dt;
                py += vy * dt;
            }
            pathHistory.push({x: px, y: py, debris: enteredAtmosphere});
        }

        draw();
        requestAnimationFrame(update);
    }

    function checkLanding() {
        let landTheta = Math.atan2(py, px);
        // 각도를 0 ~ 2PI 범위로 보정
        if (landTheta < 0) landTheta += Math.PI * 2;

        let nMin = THETA_NEMO - DNEMO;
        let nMax = THETA_NEMO + DNEMO;

        let dHalf = debrisWidthRad / 2;
        let dMin = landTheta - dHalf;
        let dMax = landTheta + dHalf;

        // 파편 전체가 포인트 니모 안에 존재하는지 판정
        if (dMin >= nMin && dMax <= nMax) {
            endSimulation(true);
        } else {
            endSimulation(false);
        }
    }

    function endSimulation(isSuccess) {
        state = 'FINISHED';
        if (isSuccess) {
            overlay.textContent = 'SUCCESS';
            overlay.className = 'success';
        } else {
            overlay.textContent = 'FAIL';
            overlay.className = 'fail';
        }
        overlay.style.display = 'block';
        startBtn.style.display = 'none';
        resetBtn.style.display = 'inline-block';
        draw();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        // 화면 안 상밀도 비율 매핑 스케일 (R0 기준 공간을 캔버스 크기에 최적화)
        const viewRadius = R0 * 1.15;
        const scale = (canvas.width / 2) / viewRadius;

        // 1. 대기권 그리기
        ctx.beginPath();
        ctx.arc(cx, cy, R_ATM * scale, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(52, 152, 219, 0.08)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(52, 152, 219, 0.25)';
        ctx.lineWidth = 1;
        ctx.stroke();

        // 2. 지구본체 그리기
        ctx.beginPath();
        ctx.arc(cx, cy, RE * scale, 0, Math.PI * 2);
        ctx.fillStyle = '#1c2d42';
        ctx.fill();
        ctx.strokeStyle = '#2c3e50';
        ctx.lineWidth = 2;
        ctx.stroke();

        // 3. 포인트 니모 구역 그리기 (지구 표면 호 형태)
        ctx.beginPath();
        ctx.arc(cx, cy, RE * scale, THETA_NEMO - DNEMO, THETA_NEMO + DNEMO);
        ctx.strokeStyle = '#e74c3c';
        ctx.lineWidth = 6;
        ctx.stroke();

        // 4. 낙하 궤적 그리기
        if (pathHistory.length > 1) {
            ctx.lineWidth = 1.5;
            for (let i = 1; i < pathHistory.length; i++) {
                ctx.beginPath();
                ctx.moveTo(cx + pathHistory[i-1].x * scale, cy + pathHistory[i-1].y * scale);
                ctx.lineTo(cx + pathHistory[i].x * scale, cy + pathHistory[i].y * scale);
                ctx.strokeStyle = pathHistory[i].debris ? 'rgba(230, 126, 34, 0.4)' : 'rgba(255, 255, 255, 0.3)';
                ctx.stroke();
            }
        }

        // 5. 위성 객체 렌더링
        let sx = cx + px * scale;
        let sy = cy + py * scale;

        if (state === 'ORBIT' || (state === 'DESCENT' && !enteredAtmosphere) || state === 'IDLE') {
            // 기본 위성 포인트
            ctx.beginPath();
            ctx.arc(sx, sy, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#f1c40f';
            ctx.fill();
        } else if (enteredAtmosphere) {
            // 파편 면적(호 형태) 변환 렌더링
            let currentTheta = Math.atan2(py, px);
            ctx.beginPath();
            // 위성 실시간 고도 구면에 파편 확산 시각화
            let currentR = Math.sqrt(px*px + py*py);
            ctx.arc(cx, cy, currentR * scale, currentTheta - debrisWidthRad/2, currentTheta + debrisWidthRad/2);
            ctx.strokeStyle = '#e67e22';
            ctx.lineWidth = 5;
            ctx.stroke();
        }
    }

    // 초기 구동 상태 매핑
    px = 0;
    py = -R0;

    startBtn.addEventListener('click', startSimulation);
    resetBtn.addEventListener('click', init);
    satSelect.addEventListener('change', () => {
        currentSat = satellites[satSelect.value];
    });

    init();
</script>

</body>
</html>
