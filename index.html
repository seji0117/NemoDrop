<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>위성 낙하 시뮬레이션</title>
    <style>
        :root {
            --bg-color: #0b0d17;
            --panel-bg: #1a1d2d;
            --text-color: #e0e6ed;
            --accent: #4d90fe;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            display: flex;
            width: 90vw;
            max-width: 1200px;
            height: 85vh;
            background-color: var(--panel-bg);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        .sidebar {
            width: 300px;
            padding: 30px 20px;
            background-color: rgba(0,0,0,0.2);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 {
            margin-top: 0;
            font-size: 1.5rem;
            text-align: center;
            color: var(--accent);
            margin-bottom: 30px;
        }
        .control-group {
            margin-bottom: 25px;
        }
        .control-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #a0aabf;
        }
        .radio-item {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        .radio-item input {
            margin-right: 10px;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .slider-container input[type=range] {
            flex-grow: 1;
        }
        .buttons {
            margin-top: auto;
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        #startBtn {
            background-color: var(--accent);
            color: white;
        }
        #startBtn:hover {
            background-color: #357abd;
        }
        #resetBtn {
            background-color: #444;
            color: white;
        }
        #resetBtn:hover {
            background-color: #555;
        }
        .canvas-container {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #111522 0%, #050608 100%);
        }
        canvas {
            display: block;
        }
        #resultOverlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 5px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        #resultOverlay.success {
            color: #4caf50;
            opacity: 1;
        }
        #resultOverlay.fail {
            color: #f44336;
            opacity: 1;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h2>위성 낙하 컨트롤</h2>
        
        <div class="control-group">
            <label>1. 위성 선택</label>
            <div class="radio-item">
                <input type="radio" id="sat_sputnik" name="satellite" value="sputnik" checked>
                <label for="sat_sputnik">스푸트니크 1호</label>
            </div>
            <div class="radio-item">
                <input type="radio" id="sat_mir" name="satellite" value="mir">
                <label for="sat_mir">미르 우주정거장</label>
            </div>
            <div class="radio-item">
                <input type="radio" id="sat_iss" name="satellite" value="iss">
                <label for="sat_iss">국제우주정거장 (ISS)</label>
            </div>
        </div>

        <div class="control-group">
            <label>2. 역추진 감속량 (Δv)</label>
            <div class="slider-container">
                <span>10</span>
                <input type="range" id="deltaVSlider" min="10" max="300" value="150">
                <span>300</span>
            </div>
        </div>

        <div class="buttons">
            <button id="startBtn">시작 (Deorbit)</button>
            <button id="resetBtn">Reset</button>
        </div>
    </div>
    
    <div class="canvas-container">
        <canvas id="simCanvas" width="800" height="800"></canvas>
        <div id="resultOverlay"></div>
    </div>
</div>

<script>
    // --- 1. 지구 및 공간 물리 상수 ---
    const Earth = {
        mu: 3.986e14,
        R: 6378000,
        atm_h: 100000,
        nemo_R: 2688000
    };
    
    const Atmosphere = {
        H: 7500,
        rho_0: 1.225
    };

    // 화면 시각화 스케일 (100km = 30px 기준 선형 매핑)
    const Visual = {
        R: 150,           // 지구 반지름 시각화
        atm_h: 30         // 대기권 두께 시각화
    };
    const scaleFactor = Visual.atm_h / Earth.atm_h; 

    // --- 2. 위성 고유 제원 ---
    const satellites = {
        sputnik: { m: 83.6, A: 0.26, Cd: 2.1, life: 1, k_break: 5000, h0_relative: 477000 },
        mir: { m: 130000, A: 350, Cd: 2.3, life: 2, k_break: 150000, h0_relative: 290000 },
        iss: { m: 450000, A: 2200, Cd: 2.6, life: 3, k_break: 400000, h0_relative: 320000 }
    };

    // --- 3. DOM 요소 및 상태 변수 ---
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    const resultOverlay = document.getElementById('resultOverlay');
    const radios = document.getElementsByName('satellite');
    const slider = document.getElementById('deltaVSlider');
    
    let cx = canvas.width / 2;
    let cy = canvas.height / 2;

    let currentState = 'select'; // select, orbiting, deorbiting, done
    let selectedSatKey = 'sputnik';
    let deltaV = 150;
    
    // 시뮬레이션 물리 상태
    let sat = null;
    let r0 = 0;
    let v0 = 0;
    let physX = 0, physY = 0;
    let vx = 0, vy = 0;
    
    // 로직 및 타이머 상태
    let orbitStartTime = 0;
    let deorbitStartTime = 0;
    let enteredAtmosphere = false;
    let arcWidthRad = 0;
    let currentMathTheta = 0; // x축 기준 수학적 각도

    // 수치해석 타임스텝 설정 (프레임당 연산량 분할)
    const DT = 0.15; 
    const SUBSTEPS = 200; 

    // --- 4. 유틸리티 및 초기화 함수 ---
    function getSelectedSatellite() {
        for (let radio of radios) {
            if (radio.checked) return satellites[radio.value];
        }
        return satellites.sputnik;
    }

    function resetSimulation() {
        currentState = 'select';
        resultOverlay.className = '';
        resultOverlay.innerText = '';
        selectedSatKey = Array.from(radios).find(r => r.checked).value;
        sat = getSelectedSatellite();
        deltaV = parseFloat(slider.value);
        
        let h0_true = Earth.atm_h + sat.h0_relative;
        r0 = Earth.R + h0_true;
        v0 = Math.sqrt(Earth.mu / r0);
        
        // 초기 시각적 위치 (궤도 상단)
        currentMathTheta = Math.PI / 2;
    }

    // 수학 각도(x축 0, y축 위)를 캔버스 각도(x축 0, y축 아래)로 매핑
    function mapRadiusToVisual(r) {
        return Visual.R + (r - Earth.R) * scaleFactor;
    }

    // 각도 정규화 [-PI, PI]
    function normalizeAngle(a) {
        while (a > Math.PI) a -= 2 * Math.PI;
        while (a < -Math.PI) a += 2 * Math.PI;
        return a;
    }

    // --- 5. 렌더링 로직 ---
    function drawEnvironment() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 대기권 (동심원)
        ctx.beginPath();
        ctx.arc(cx, cy, Visual.R + Visual.atm_h, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(77, 144, 254, 0.1)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(77, 144, 254, 0.3)';
        ctx.lineWidth = 1;
        ctx.stroke();

        // 지구
        ctx.beginPath();
        ctx.arc(cx, cy, Visual.R, 0, Math.PI * 2);
        ctx.fillStyle = '#1c3144';
        ctx.fill();
        
        // 포인트 니모 (타깃 호)
        let nemoWidth = 2 * Earth.nemo_R / Earth.R; // 약 0.84 라디안
        ctx.beginPath();
        // 캔버스 기준 바닥은 Math.PI / 2
        ctx.arc(cx, cy, Visual.R, Math.PI/2 - nemoWidth/2, Math.PI/2 + nemoWidth/2);
        ctx.strokeStyle = '#4caf50';
        ctx.lineWidth = 6;
        ctx.stroke();
    }

    // 유저 선택 시 실시간 예측 궤적 (타원) 렌더링
    function drawPredictedOrbit() {
        if (currentState !== 'select' && currentState !== 'orbiting') return;

        let va = v0 - deltaV;
        let a = (Earth.mu * r0) / (2 * Earth.mu - r0 * va * va);
        let e = Math.abs((r0 / a) - 1);

        ctx.beginPath();
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.setLineDash([4, 4]);

        for (let i = 0; i <= 100; i++) {
            let nu = (i / 100) * Math.PI * 2;
            let r_path = (a * (1 - e*e)) / (1 + e * Math.cos(nu));
            let theta_path = nu + Math.PI / 2; // Apogee를 Top(PI/2)에 맞춤

            let vis_r = mapRadiusToVisual(r_path);
            let px = cx + vis_r * Math.cos(theta_path);
            let py = cy - vis_r * Math.sin(theta_path);

            if (i === 0) ctx.moveTo(px, py);
            else ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.setLineDash([]);
    }

    function drawSatellite() {
        let vis_r, px, py;

        if (currentState === 'select' || currentState === 'orbiting') {
            vis_r = mapRadiusToVisual(r0);
            px = cx + vis_r * Math.cos(currentMathTheta);
            py = cy - vis_r * Math.sin(currentMathTheta);
        } else {
            let r_current = Math.sqrt(physX*physX + physY*physY);
            currentMathTheta = Math.atan2(physY, physX);
            vis_r = mapRadiusToVisual(r_current);
            px = cx + vis_r * Math.cos(currentMathTheta);
            py = cy - vis_r * Math.sin(currentMathTheta);
        }

        if (enteredAtmosphere) {
            // 대기권 진입 후 파편화 호(Arc) 렌더링
            let canvasTheta = -currentMathTheta;
            ctx.beginPath();
            ctx.arc(cx, cy, Math.max(Visual.R, vis_r), canvasTheta - arcWidthRad/2, canvasTheta + arcWidthRad/2);
            ctx.strokeStyle = '#ff5252';
            ctx.lineWidth = 4;
            ctx.stroke();
        } else {
            // 원형 위성 렌더링
            ctx.beginPath();
            ctx.arc(px, py, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ffffff';
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    // --- 6. 물리 엔진 및 메인 루프 ---
    function updatePhysics() {
        if (currentState === 'orbiting') {
            let elapsed = (Date.now() - orbitStartTime) / 1000;
            let tau = sat.life;
            
            // X초에 걸쳐 타깃 지점(Top, PI/2)에 도달하도록 시각적 회전각 역산
            currentMathTheta = Math.PI/2 + (2 * Math.PI * tau) - (2 * Math.PI * elapsed);
            
            if (elapsed >= tau) {
                // 낙하 시작점(포인트 니모 대척점, Top)에 고정
                physX = 0; 
                physY = r0;
                vx = v0 - deltaV; // 역추진 감속
                vy = 0;
                
                currentState = 'deorbiting';
                deorbitStartTime = Date.now();
                enteredAtmosphere = false;
            }
        } 
        else if (currentState === 'deorbiting') {
            let realElapsed = (Date.now() - deorbitStartTime) / 1000;
            let r = Math.sqrt(physX*physX + physY*physY);
            let h = r - Earth.R;

            // 2초 경과 시 강제 FAIL 판정 (추락 불가, 무한 궤도 돌기 시)
            if (realElapsed > 2.0 && h > 0) {
                currentState = 'done';
                showResult(false);
                return;
            }

            // 수치 해석 적분 (Euler)
            for (let i = 0; i < SUBSTEPS; i++) {
                r = Math.sqrt(physX*physX + physY*physY);
                h = r - Earth.R;
                
                if (h <= 0) {
                    evaluateImpact();
                    return;
                }

                let ag = -Earth.mu / (r * r);
                let agx = ag * (physX / r);
                let agy = ag * (physY / r);

                let adx = 0, ady = 0;
                
                // 대기 저항 적용
                if (h < Earth.atm_h) {
                    let v = Math.sqrt(vx*vx + vy*vy);
                    let rho = Atmosphere.rho_0 * Math.exp(-h / Atmosphere.H);
                    let ad = 0.5 * rho * v * v * (sat.Cd * sat.A / sat.m);
                    
                    adx = -ad * (vx / v);
                    ady = -ad * (vy / v);

                    if (!enteredAtmosphere) {
                        enteredAtmosphere = true;
                        // 진입각 및 파편 길이(L_final) 결정
                        let vr = Math.abs((physX*vx + physY*vy)/r);
                        let vt = Math.abs((-physY*vx + physX*vy)/r);
                        let gamma_entry = Math.max(0.0001, Math.atan2(vr, vt));
                        
                        let L_final = sat.k_break / Math.sin(gamma_entry);
                        arcWidthRad = L_final / Earth.R; 
                    }
                }

                vx += (agx + adx) * DT;
                vy += (agy + ady) * DT;
                physX += vx * DT;
                physY += vy * DT;
            }
        }
    }

    function evaluateImpact() {
        currentState = 'done';
        let hitMathTheta = Math.atan2(physY, physX);
        let nHit = normalizeAngle(hitMathTheta);
        let nTarget = -Math.PI / 2; // 포인트 니모 정중앙 (Bottom)

        let diff = Math.abs(normalizeAngle(nHit - nTarget));
        let halfArc = arcWidthRad / 2;
        let halfNemo = (2 * Earth.nemo_R / Earth.R) / 2;

        // 파편 전체가 포인트 니모 구역 안에 완벽히 들어갔는지 판정
        if (diff + halfArc <= halfNemo) {
            showResult(true);
        } else {
            showResult(false);
        }
    }

    function showResult(isSuccess) {
        resultOverlay.innerText = isSuccess ? "SUCCESS" : "FAIL";
        resultOverlay.className = isSuccess ? "success" : "fail";
    }

    function loop() {
        updatePhysics();
        drawEnvironment();
        drawPredictedOrbit();
        drawSatellite();
        requestAnimationFrame(loop);
    }

    // --- 7. 이벤트 리스너 ---
    slider.addEventListener('input', (e) => {
        if (currentState === 'select') {
            deltaV = parseFloat(e.target.value);
        }
    });

    radios.forEach(r => r.addEventListener('change', () => {
        if (currentState === 'select') resetSimulation();
    }));

    document.getElementById('startBtn').addEventListener('click', () => {
        if (currentState === 'select') {
            orbitStartTime = Date.now();
            currentState = 'orbiting';
        }
    });

    document.getElementById('resetBtn').addEventListener('click', resetSimulation);

    // 초기화 및 루프 시작
    resetSimulation();
    loop();

</script>
</body>
</html>
